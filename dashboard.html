<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveAdvocate - Client Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-slate-900 text-white p-6">
      <div class="flex items-center gap-3 mb-10">
        <img src="/logo.png" alt="Logo" class="h-8">
        <span class="text-2xl font-bold">DriveAdvocate</span>
      </div>
      <nav class="space-y-2">
        <a href="#" class="block px-4 py-3 rounded-xl bg-slate-800">Dashboard</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-slate-800">My Deals</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-slate-800">Documents</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-slate-800">Messages</a>
        <a href="#" class="block px-4 py-3 rounded-xl hover:bg-slate-800">Account</a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
      <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Welcome back, [Client Name]</h1>
        
        <div class="bg-white rounded-3xl p-8 shadow mb-8">
          <p class="text-emerald-600 font-medium">Current Deal</p>
          <p className="text-4xl font-bold mt-2">2025 Toyota Camry</p>
          <p class="text-slate-500">Status: In Negotiation</p>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div class="bg-white p-8 rounded-3xl shadow">
            <h3 class="font-semibold mb-6">Quick Actions</h3>
            <button class="block w-full bg-slate-900 text-white py-4 rounded-2xl mb-4">Download Negotiated Worksheet</button>
            <button class="block w-full bg-emerald-600 text-white py-4 rounded-2xl">Message Your Advocate</button>
          </div>
          <div class="bg-white p-8 rounded-3xl shadow">
            <h3 class="font-semibold mb-6">Recent Activity</h3>
            <div class="space-y-4 text-sm">
              <p>Dealer response received • 2 hours ago</p>
              <p>Research report sent • Yesterday</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
